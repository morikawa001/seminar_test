<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テトリス</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { background: #e8eaf6; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; color: #333; }
.container { display: flex; gap: 16px; align-items: flex-start; max-height: 100vh; }
canvas { border: 2px solid #9fa8da; background: #fff; border-radius: 4px; }
.side { display: flex; flex-direction: column; gap: 8px; min-width: 110px; }
.panel { background: #fff; border: 2px solid #9fa8da; border-radius: 8px; padding: 8px; }
.panel h3 { font-size: 10px; margin-bottom: 4px; color: #e91e63; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
.panel .value { font-size: 18px; font-weight: bold; color: #333; }
.panel .value.hi { color: #ff9800; font-size: 13px; }
#nextCanvas, #holdCanvas { background: #fff; border: none; }
.controls { font-size: 10px; line-height: 1.5; color: #666; }
.controls kbd { background: #e8eaf6; border: 1px solid #9fa8da; border-radius: 3px; padding: 0 3px; font-size: 9px; color: #333; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.88); z-index: 10; border-radius: 4px; }
#overlay h1 { font-size: 28px; margin-bottom: 8px; color: #e91e63; }
#overlay p { font-size: 14px; color: #555; margin: 2px 0; }
#overlay .hi { color: #ff9800; }
.game-wrapper { position: relative; flex-shrink: 0; }
.combo-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; font-weight: bold; color: #e91e63; text-shadow: 0 0 8px rgba(233,30,99,0.3); pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5; }
.combo-display.show { opacity: 1; }
.line-clear-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.1s; }
.btn-quit { position: absolute; top: 4px; right: 4px; background: #e91e63; color: #fff; border: none; border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; z-index: 20; font-weight: bold; }
.btn-quit:hover { background: #c2185b; }
.touch-controls { display: none; position: fixed; bottom: 10px; left: 0; right: 0; justify-content: center; gap: 30px; padding: 0 16px; z-index: 20; }
.touch-btn { width: 50px; height: 50px; border-radius: 14px; border: 2px solid #9fa8da; background: #fff; color: #333; font-size: 18px; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; touch-action: manipulation; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.touch-btn:active { background: #e91e63; border-color: #e91e63; color: #fff; }
.touch-row { display: flex; gap: 8px; }
@media (max-width: 500px) {
  .container { flex-direction: column; align-items: center; gap: 4px; }
  .game-wrapper canvas { width: min(80vw, 260px); height: auto; aspect-ratio: 1/2; }
  .side { flex-direction: row; flex-wrap: wrap; gap: 4px; justify-content: center; min-width: auto; max-width: 90vw; }
  .side .panel { padding: 4px 6px; }
  .side .panel h3 { font-size: 8px; margin-bottom: 2px; }
  .side .panel .value { font-size: 13px; }
  .side .panel .value.hi { font-size: 10px; }
  .side .controls { display: none; }
  .touch-controls { display: flex; }
  #nextCanvas { width: 70px; height: 130px; }
  #holdCanvas { width: 70px; height: 45px; }
}
@media (min-height: 700px) and (min-width: 501px) {
  .container { max-height: 98vh; }
}
}
</style>
</head>
<body>
<div class="container">
  <div class="game-wrapper">
    <canvas id="board" width="300" height="600"></canvas>
    <div class="combo-display" id="comboDisplay"></div>
    <div class="line-clear-flash" id="flash"></div>
    <button class="btn-quit" id="btnQuit" style="display:none">終了</button>
    <div id="overlay"><h1>テトリス</h1><p>Enterキーでスタート</p></div>
  </div>
  <div class="side">
    <div class="panel">
      <h3>HOLD</h3>
      <canvas id="holdCanvas" width="100" height="60"></canvas>
    </div>
    <div class="panel">
      <h3>NEXT</h3>
      <canvas id="nextCanvas" width="100" height="180"></canvas>
    </div>
    <div class="panel">
      <h3>SCORE</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <h3>BEST</h3>
      <div class="value hi" id="best">0</div>
    </div>
    <div class="panel">
      <h3>LINES</h3>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel">
      <h3>LEVEL</h3>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel controls">
      <h3>操作</h3>
      <kbd>←</kbd><kbd>→</kbd> 移動<br>
      <kbd>↑</kbd> 回転<br>
      <kbd>↓</kbd> ソフトドロップ<br>
      <kbd>Space</kbd> ハードドロップ<br>
      <kbd>Shift</kbd> ホールド<br>
      <kbd>P</kbd> 一時停止
    </div>
  </div>
</div>

<div class="touch-controls" id="touchControls">
  <div class="touch-row">
    <button class="touch-btn" id="btnLeft">←</button>
    <button class="touch-btn" id="btnDown">↓</button>
    <button class="touch-btn" id="btnRight">→</button>
  </div>
  <div class="touch-row">
    <button class="touch-btn" id="btnRotate">↻</button>
    <button class="touch-btn" id="btnDrop">⤓</button>
    <button class="touch-btn" id="btnHold">H</button>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('holdCanvas');
const hctx = holdCanvas.getContext('2d');
const overlay = document.getElementById('overlay');
const comboDisplay = document.getElementById('comboDisplay');
const flash = document.getElementById('flash');
const btnQuit = document.getElementById('btnQuit');

const PIECES = {
  I: { shape: [[0,0],[1,0],[2,0],[3,0]], color: '#00e5ff', dark: '#0097a7' },
  O: { shape: [[0,0],[1,0],[0,1],[1,1]], color: '#ffeb3b', dark: '#f9a825' },
  T: { shape: [[0,0],[1,0],[2,0],[1,1]], color: '#e040fb', dark: '#9c27b0' },
  S: { shape: [[1,0],[2,0],[0,1],[1,1]], color: '#69f0ae', dark: '#2e7d32' },
  Z: { shape: [[0,0],[1,0],[1,1],[2,1]], color: '#ff5252', dark: '#c62828' },
  J: { shape: [[0,0],[0,1],[1,1],[2,1]], color: '#448aff', dark: '#1565c0' },
  L: { shape: [[2,0],[0,1],[1,1],[2,1]], color: '#ffab40', dark: '#e65100' }
};
const PIECE_NAMES = Object.keys(PIECES);

let grid, score, lines, level, combo;
let currentPiece, nextQueue, holdPiece, holdUsed;
let gameOver = true, paused, dropInterval, lastDrop, animId;
let bestScore = parseInt(localStorage.getItem('tetris_best') || '0');
let lastMoveWasRotation = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, dur, vol = 0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function sfxMove() { playSound(200, 'square', 0.05, 0.08); }
function sfxRotate() { playSound(300, 'sine', 0.08, 0.1); }
function sfxDrop() { playSound(150, 'triangle', 0.1, 0.12); }
function sfxLock() { playSound(100, 'square', 0.08, 0.1); }
function sfxLine(n) {
  const freqs = [523, 659, 784, 1047];
  freqs.slice(0, n).forEach((f, i) => setTimeout(() => playSound(f, 'square', 0.15, 0.12), i * 60));
}
function sfxLevelUp() {
  [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => playSound(f, 'sine', 0.2, 0.1), i * 80));
}
function sfxGameOver() {
  [400, 350, 300, 250].forEach((f, i) => setTimeout(() => playSound(f, 'sawtooth', 0.3, 0.08), i * 150));
}
function sfxHold() { playSound(440, 'sine', 0.1, 0.1); }

function initGrid() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function createBag() {
  const bag = [...PIECE_NAMES];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
  return bag;
}

let bag = [];
function nextFromBag() {
  if (bag.length === 0) bag = createBag();
  const name = bag.pop();
  const p = PIECES[name];
  return { name, blocks: p.shape.map(b => [...b]), color: p.color, dark: p.dark, x: 3, y: 0 };
}

function collides(piece, dx, dy) {
  return piece.blocks.some(([bx, by]) => {
    const nx = piece.x + bx + dx;
    const ny = piece.y + by + dy;
    return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny][nx]);
  });
}

function isTSpin() {
  if (currentPiece.name !== 'T') return false;
  if (!lastMoveWasRotation) return false;
  const cx = currentPiece.x + 1, cy = currentPiece.y + 1;
  let corners = 0;
  if (grid[cy-1]?.[cx-1]) corners++;
  if (grid[cy-1]?.[cx+1]) corners++;
  if (grid[cy+1]?.[cx-1]) corners++;
  if (grid[cy+1]?.[cx+1]) corners++;
  return corners >= 3;
}

function lock() {
  currentPiece.blocks.forEach(([bx, by]) => {
    const gy = currentPiece.y + by;
    const gx = currentPiece.x + bx;
    if (gy >= 0) grid[gy][gx] = { color: currentPiece.color, dark: currentPiece.dark };
  });
  sfxLock();
  const cleared = clearLines();
  if (cleared > 0) { sfxLine(cleared); showFlash(); }

  const tspin = isTSpin();
  let pts = tspin
    ? [0, 800, 1200, 1600, 2000][cleared] * level
    : [0, 100, 300, 500, 800][cleared] * level;

  if (cleared > 0) { combo++; pts += 50 * combo * level; } else { combo = 0; }
  if (combo >= 2) showCombo(combo);

  score += pts;
  holdUsed = false;
  currentPiece = nextQueue.shift();
  nextQueue.push(nextFromBag());
  if (collides(currentPiece, 0, 0)) endGame();
  updateUI();
}

function clearLines() {
  let cleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (grid[y].every(c => c !== null)) {
      grid.splice(y, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      y++;
    }
  }
  if (cleared > 0) {
    lines += cleared;
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel > level) { level = newLevel; sfxLevelUp(); }
    dropInterval = Math.max(50, 1000 - (level - 1) * 80);
  }
  return cleared;
}

function hold() {
  if (holdUsed) return;
  sfxHold();
  holdUsed = true;
  const held = currentPiece;
  if (holdPiece) {
    currentPiece = holdPiece;
    currentPiece.x = 3; currentPiece.y = 0;
    currentPiece.blocks = PIECES[currentPiece.name].shape.map(b => [...b]);
    holdPiece = { name: held.name, color: held.color, dark: held.dark };
  } else {
    holdPiece = { name: held.name, color: held.color, dark: held.dark };
    currentPiece = nextQueue.shift();
    nextQueue.push(nextFromBag());
  }
}

function rotate() {
  const rotated = currentPiece.blocks.map(([x, y]) => [-y, x]);
  const minX = Math.min(...rotated.map(b => b[0]));
  const minY = Math.min(...rotated.map(b => b[1]));
  const normalized = rotated.map(([x, y]) => [x - minX, y - minY]);
  const old = currentPiece.blocks;
  currentPiece.blocks = normalized;
  const kicks = [0, -1, 1, -2, 2];
  for (const dx of kicks) {
    if (!collides(currentPiece, dx, 0)) {
      currentPiece.x += dx;
      lastMoveWasRotation = true;
      sfxRotate();
      return;
    }
  }
  currentPiece.blocks = old;
}

function hardDrop() {
  let dropped = 0;
  while (!collides(currentPiece, 0, 1)) { currentPiece.y++; dropped++; }
  score += dropped * 2;
  sfxDrop();
  lastMoveWasRotation = false;
  lock();
}

function drawBlock(context, x, y, gem, size) {
  const px = x * size + 1;
  const py = y * size + 1;
  const s = size - 2;
  const base = gem.color || gem;
  const dark = gem.dark || gem;
  const cx = px + s / 2;
  const cy = py + s / 2;

  const grad = context.createLinearGradient(px, py, px + s, py + s);
  grad.addColorStop(0, base);
  grad.addColorStop(1, dark);
  context.fillStyle = grad;
  context.beginPath();
  context.roundRect(px, py, s, s, 3);
  context.fill();

  context.fillStyle = 'rgba(255,255,255,0.45)';
  context.beginPath();
  context.roundRect(px + 2, py + 2, s - 4, s * 0.4, 2);
  context.fill();

  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.beginPath();
  context.arc(cx - s * 0.15, cy - s * 0.1, s * 0.12, 0, Math.PI * 2);
  context.fill();
}

function drawGhost() {
  let gy = 0;
  while (!collides(currentPiece, 0, gy + 1)) gy++;
  if (gy === 0) return;
  ctx.globalAlpha = 0.2;
  currentPiece.blocks.forEach(([bx, by]) => {
    const px = currentPiece.x + bx;
    const py = currentPiece.y + by + gy;
    if (py >= 0) drawBlock(ctx, px, py, currentPiece, BLOCK);
  });
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
  ctx.strokeStyle = '#e0e0e0';
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*BLOCK,0); ctx.lineTo(x*BLOCK,ROWS*BLOCK); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*BLOCK); ctx.lineTo(COLS*BLOCK,y*BLOCK); ctx.stroke(); }
  grid.forEach((row, y) => row.forEach((c, x) => { if (c) drawBlock(ctx, x, y, c, BLOCK); }));
  if (currentPiece) {
    drawGhost();
    currentPiece.blocks.forEach(([bx, by]) => {
      const py = currentPiece.y + by;
      if (py >= 0) drawBlock(ctx, currentPiece.x + bx, py, currentPiece, BLOCK);
    });
  }

  nctx.clearRect(0, 0, 100, 180);
  nextQueue.forEach((p, i) => {
    const size = 20;
    const np = PIECES[p.name];
    const ox = 1, oy = i * 4 + 1;
    np.shape.forEach(([bx, by]) => {
      drawBlock(nctx, bx + ox, by + oy, np, size);
    });
  });

  hctx.clearRect(0, 0, 100, 60);
  if (holdPiece) {
    const size = 18;
    const hp = PIECES[holdPiece.name];
    hp.shape.forEach(([bx, by]) => {
      if (holdUsed) {
        hctx.fillStyle = '#ccc';
        hctx.beginPath();
        hctx.roundRect((bx + 1) * size + 1, (by + 1) * size + 1, size - 2, size - 2, 2);
        hctx.fill();
      } else {
        drawBlock(hctx, bx + 1, by + 1, holdPiece, size);
      }
    });
  }
}

function showFlash() {
  flash.style.opacity = '0.3';
  setTimeout(() => flash.style.opacity = '0', 100);
}

function showCombo(n) {
  comboDisplay.textContent = `${n} COMBO!`;
  comboDisplay.classList.add('show');
  setTimeout(() => comboDisplay.classList.remove('show'), 1200);
}

function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('tetris_best', bestScore);
  }
  document.getElementById('best').textContent = bestScore.toLocaleString();
}

function gameLoop(time) {
  if (gameOver || paused) return;
  if (!lastDrop) lastDrop = time;
  if (time - lastDrop > dropInterval) {
    if (!collides(currentPiece, 0, 1)) {
      currentPiece.y++;
    } else {
      lastMoveWasRotation = false;
      lock();
    }
    lastDrop = time;
    updateUI();
  }
  draw();
  animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  audioCtx.resume();
  initGrid();
  bag = [];
  score = 0; lines = 0; level = 1; combo = 0;
  dropInterval = 1000; lastDrop = 0;
  gameOver = false; paused = false;
  holdPiece = null; holdUsed = false;
  currentPiece = nextFromBag();
  nextQueue = [nextFromBag(), nextFromBag(), nextFromBag()];
  updateUI();
  overlay.style.display = 'none';
  btnQuit.style.display = 'block';
  animId = requestAnimationFrame(gameLoop);
}

function quitGame() {
  if (!gameOver) endGame();
}

function endGame() {
  gameOver = true;
  cancelAnimationFrame(animId);
  sfxGameOver();
  btnQuit.style.display = 'none';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('tetris_best', bestScore);
  }
  overlay.innerHTML = `<h1>ゲームオーバー</h1><p>スコア: ${score.toLocaleString()}</p><p class="hi">ベスト: ${bestScore.toLocaleString()}</p><p>Enterキーでリトライ</p>`;
  overlay.style.display = 'flex';
  draw();
}

btnQuit.addEventListener('click', quitGame);

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && gameOver) { startGame(); return; }
  if (!currentPiece || gameOver) return;
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    if (!paused) { lastDrop = 0; animId = requestAnimationFrame(gameLoop); }
    return;
  }
  if (paused) return;
  switch (e.key) {
    case 'ArrowLeft':
      if (!collides(currentPiece, -1, 0)) { currentPiece.x--; sfxMove(); lastMoveWasRotation = false; }
      break;
    case 'ArrowRight':
      if (!collides(currentPiece, 1, 0)) { currentPiece.x++; sfxMove(); lastMoveWasRotation = false; }
      break;
    case 'ArrowDown':
      if (!collides(currentPiece, 0, 1)) { currentPiece.y++; score++; lastMoveWasRotation = false; updateUI(); }
      break;
    case 'ArrowUp': rotate(); break;
    case ' ': hardDrop(); break;
    case 'Shift': hold(); break;
  }
  e.preventDefault();
  draw();
});

document.getElementById('btnLeft').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused && !collides(currentPiece, -1, 0)) { currentPiece.x--; sfxMove(); draw(); } });
document.getElementById('btnRight').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused && !collides(currentPiece, 1, 0)) { currentPiece.x++; sfxMove(); draw(); } });
document.getElementById('btnDown').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused && !collides(currentPiece, 0, 1)) { currentPiece.y++; score++; updateUI(); draw(); } });
document.getElementById('btnRotate').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused) rotate(); draw(); });
document.getElementById('btnDrop').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused) hardDrop(); });
document.getElementById('btnHold').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused) { hold(); draw(); } });

draw();
document.getElementById('best').textContent = bestScore.toLocaleString();

const container = document.querySelector('.container');
function fitToScreen() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const cw = container.offsetWidth;
  const ch = container.offsetHeight;
  const isMobile = vw <= 500;
  if (isMobile) {
    container.style.transform = '';
    container.style.transformOrigin = '';
    return;
  }
  const scaleX = vw / cw;
  const scaleY = vh / ch;
  const scale = Math.min(scaleX, scaleY, 1);
  container.style.transform = `scale(${scale})`;
  container.style.transformOrigin = 'center center';
}
window.addEventListener('resize', fitToScreen);
fitToScreen();
</script>
</body>
</html>
