<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テトリス</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #eee; overflow: hidden; }
.container { display: flex; gap: 20px; align-items: flex-start; }
canvas { border: 2px solid #444; background: #0f0f23; }
.side { display: flex; flex-direction: column; gap: 12px; min-width: 130px; }
.panel { background: #16213e; border: 2px solid #444; border-radius: 8px; padding: 10px; }
.panel h3 { font-size: 11px; margin-bottom: 6px; color: #e94560; text-transform: uppercase; letter-spacing: 1px; }
.panel .value { font-size: 20px; font-weight: bold; }
.panel .value.hi { color: #f0a000; font-size: 14px; }
#nextCanvas { background: #0f0f23; border: none; }
#holdCanvas { background: #0f0f23; border: none; }
.controls { font-size: 11px; line-height: 1.7; color: #999; }
.controls kbd { background: #333; border: 1px solid #555; border-radius: 3px; padding: 0 4px; font-size: 10px; color: #eee; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.75); z-index: 10; }
#overlay h1 { font-size: 36px; margin-bottom: 8px; color: #e94560; }
#overlay p { font-size: 16px; color: #aaa; margin: 2px 0; }
#overlay .hi { color: #f0a000; }
.game-wrapper { position: relative; }
.combo-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(233,69,96,0.8); pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5; }
.combo-display.show { opacity: 1; }
.line-clear-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.1s; }
.touch-controls { display: none; position: fixed; bottom: 10px; left: 0; right: 0; justify-content: space-around; padding: 0 10px; z-index: 20; }
.touch-btn { width: 56px; height: 56px; border-radius: 12px; border: 2px solid #555; background: #16213e; color: #eee; font-size: 20px; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
.touch-btn:active { background: #e94560; border-color: #e94560; }
.touch-row { display: flex; gap: 8px; }
@media (max-width: 600px) {
  .container { flex-direction: column; align-items: center; gap: 8px; }
  .side { flex-direction: row; flex-wrap: wrap; gap: 8px; justify-content: center; min-width: auto; }
  .side .controls { display: none; }
  .touch-controls { display: flex; }
  canvas { width: 240px; height: 480px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="game-wrapper">
    <canvas id="board" width="300" height="600"></canvas>
    <div class="combo-display" id="comboDisplay"></div>
    <div class="line-clear-flash" id="flash"></div>
    <div id="overlay"><h1>テトリス</h1><p>Enterキーでスタート</p></div>
  </div>
  <div class="side">
    <div class="panel">
      <h3>HOLD</h3>
      <canvas id="holdCanvas" width="110" height="70"></canvas>
    </div>
    <div class="panel">
      <h3>NEXT</h3>
      <canvas id="nextCanvas" width="110" height="210"></canvas>
    </div>
    <div class="panel">
      <h3>SCORE</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <h3>BEST</h3>
      <div class="value hi" id="best">0</div>
    </div>
    <div class="panel">
      <h3>LINES</h3>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel">
      <h3>LEVEL</h3>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel controls">
      <h3>操作</h3>
      <kbd>←</kbd><kbd>→</kbd> 移動<br>
      <kbd>↑</kbd> 回転<br>
      <kbd>↓</kbd> ソフトドロップ<br>
      <kbd>Space</kbd> ハードドロップ<br>
      <kbd>Shift</kbd> ホールド<br>
      <kbd>P</kbd> 一時停止
    </div>
  </div>
</div>

<div class="touch-controls" id="touchControls">
  <div class="touch-row">
    <button class="touch-btn" id="btnLeft">←</button>
    <button class="touch-btn" id="btnDown">↓</button>
    <button class="touch-btn" id="btnRight">→</button>
  </div>
  <div class="touch-row">
    <button class="touch-btn" id="btnRotate">↻</button>
    <button class="touch-btn" id="btnDrop">⤓</button>
    <button class="touch-btn" id="btnHold">H</button>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('holdCanvas');
const hctx = holdCanvas.getContext('2d');
const overlay = document.getElementById('overlay');
const comboDisplay = document.getElementById('comboDisplay');
const flash = document.getElementById('flash');

const PIECES = {
  I: { shape: [[0,0],[1,0],[2,0],[3,0]], color: '#00f0f0' },
  O: { shape: [[0,0],[1,0],[0,1],[1,1]], color: '#f0f000' },
  T: { shape: [[0,0],[1,0],[2,0],[1,1]], color: '#a000f0' },
  S: { shape: [[1,0],[2,0],[0,1],[1,1]], color: '#00f000' },
  Z: { shape: [[0,0],[1,0],[1,1],[2,1]], color: '#f00000' },
  J: { shape: [[0,0],[0,1],[1,1],[2,1]], color: '#0000f0' },
  L: { shape: [[2,0],[0,1],[1,1],[2,1]], color: '#f0a000' }
};
const PIECE_NAMES = Object.keys(PIECES);

let grid, score, lines, level, combo;
let currentPiece, nextQueue, holdPiece, holdUsed;
let gameOver = true, paused, dropInterval, lastDrop, animId;
let bestScore = parseInt(localStorage.getItem('tetris_best') || '0');
let lastMoveWasRotation = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, dur, vol = 0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function sfxMove() { playSound(200, 'square', 0.05, 0.08); }
function sfxRotate() { playSound(300, 'sine', 0.08, 0.1); }
function sfxDrop() { playSound(150, 'triangle', 0.1, 0.12); }
function sfxLock() { playSound(100, 'square', 0.08, 0.1); }
function sfxLine(n) {
  const freqs = [523, 659, 784, 1047];
  freqs.slice(0, n).forEach((f, i) => setTimeout(() => playSound(f, 'square', 0.15, 0.12), i * 60));
}
function sfxLevelUp() {
  [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => playSound(f, 'sine', 0.2, 0.1), i * 80));
}
function sfxGameOver() {
  [400, 350, 300, 250].forEach((f, i) => setTimeout(() => playSound(f, 'sawtooth', 0.3, 0.08), i * 150));
}
function sfxHold() { playSound(440, 'sine', 0.1, 0.1); }

function initGrid() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function createBag() {
  const bag = [...PIECE_NAMES];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
  return bag;
}

let bag = [];
function nextFromBag() {
  if (bag.length === 0) bag = createBag();
  const name = bag.pop();
  const p = PIECES[name];
  return { name, blocks: p.shape.map(b => [...b]), color: p.color, x: 3, y: 0 };
}

function collides(piece, dx, dy) {
  return piece.blocks.some(([bx, by]) => {
    const nx = piece.x + bx + dx;
    const ny = piece.y + by + dy;
    return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny][nx]);
  });
}

function isTSpin() {
  if (currentPiece.name !== 'T') return false;
  if (!lastMoveWasRotation) return false;
  const cx = currentPiece.x + 1, cy = currentPiece.y + 1;
  let corners = 0;
  if (grid[cy-1]?.[cx-1]) corners++;
  if (grid[cy-1]?.[cx+1]) corners++;
  if (grid[cy+1]?.[cx-1]) corners++;
  if (grid[cy+1]?.[cx+1]) corners++;
  return corners >= 3;
}

function lock() {
  currentPiece.blocks.forEach(([bx, by]) => {
    const gy = currentPiece.y + by;
    const gx = currentPiece.x + bx;
    if (gy >= 0) grid[gy][gx] = currentPiece.color;
  });
  sfxLock();
  const cleared = clearLines();
  if (cleared > 0) {
    sfxLine(cleared);
    showFlash();
  }

  const tspin = isTSpin();
  let pts = 0;
  if (tspin) {
    pts = [0, 800, 1200, 1600, 2000][cleared] * level;
  } else {
    pts = [0, 100, 300, 500, 800][cleared] * level;
  }

  if (cleared > 0) {
    combo++;
    pts += 50 * combo * level;
  } else {
    combo = 0;
  }

  if (combo >= 2) showCombo(combo);

  score += pts;
  holdUsed = false;

  currentPiece = nextQueue.shift();
  nextQueue.push(nextFromBag());

  if (collides(currentPiece, 0, 0)) endGame();
  updateUI();
}

function clearLines() {
  let cleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (grid[y].every(c => c !== null)) {
      grid.splice(y, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      y++;
    }
  }
  if (cleared > 0) {
    lines += cleared;
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel > level) { level = newLevel; sfxLevelUp(); }
    dropInterval = Math.max(50, 1000 - (level - 1) * 80);
  }
  return cleared;
}

function hold() {
  if (holdUsed) return;
  sfxHold();
  holdUsed = true;
  const held = currentPiece;
  if (holdPiece) {
    currentPiece = holdPiece;
    currentPiece.x = 3; currentPiece.y = 0; currentPiece.blocks = PIECES[currentPiece.name].shape.map(b => [...b]);
    holdPiece = { name: held.name, color: held.color };
  } else {
    holdPiece = { name: held.name, color: held.color };
    currentPiece = nextQueue.shift();
    nextQueue.push(nextFromBag());
  }
}

function rotate() {
  const rotated = currentPiece.blocks.map(([x, y]) => [-y, x]);
  const minX = Math.min(...rotated.map(b => b[0]));
  const minY = Math.min(...rotated.map(b => b[1]));
  const normalized = rotated.map(([x, y]) => [x - minX, y - minY]);
  const old = currentPiece.blocks;
  currentPiece.blocks = normalized;
  const kicks = [0, -1, 1, -2, 2];
  for (const dx of kicks) {
    if (!collides(currentPiece, dx, 0)) {
      currentPiece.x += dx;
      lastMoveWasRotation = true;
      sfxRotate();
      return;
    }
  }
  currentPiece.blocks = old;
}

function hardDrop() {
  let dropped = 0;
  while (!collides(currentPiece, 0, 1)) { currentPiece.y++; dropped++; }
  score += dropped * 2;
  sfxDrop();
  lastMoveWasRotation = false;
  lock();
}

function drawBlock(context, x, y, color, size) {
  context.fillStyle = color;
  context.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
  context.fillStyle = 'rgba(255,255,255,0.2)';
  context.fillRect(x * size + 1, y * size + 1, size - 2, 3);
  context.fillStyle = 'rgba(0,0,0,0.15)';
  context.fillRect(x * size + 1, y * size + size - 4, size - 2, 3);
}

function drawGhost() {
  let gy = 0;
  while (!collides(currentPiece, 0, gy + 1)) gy++;
  if (gy === 0) return;
  currentPiece.blocks.forEach(([bx, by]) => {
    const px = currentPiece.x + bx;
    const py = currentPiece.y + by + gy;
    if (py >= 0) {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = currentPiece.color;
      ctx.fillRect(px * BLOCK + 2, py * BLOCK + 2, BLOCK - 4, BLOCK - 4);
      ctx.globalAlpha = 1;
    }
  });
}

function drawPiece(context, piece, offsetX, offsetY, size) {
  const p = PIECES[piece.name || piece];
  const blocks = piece.blocks || p.shape;
  blocks.forEach(([bx, by]) => {
    context.fillStyle = piece.color || p.color;
    context.fillRect((bx + offsetX) * size + 1, (by + offsetY) * size + 1, size - 2, size - 2);
  });
}

function draw() {
  ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
  ctx.strokeStyle = '#1a1a3e';
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*BLOCK,0); ctx.lineTo(x*BLOCK,ROWS*BLOCK); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*BLOCK); ctx.lineTo(COLS*BLOCK,y*BLOCK); ctx.stroke(); }
  grid.forEach((row, y) => row.forEach((c, x) => { if (c) drawBlock(ctx, x, y, c, BLOCK); }));
  if (currentPiece) {
    drawGhost();
    currentPiece.blocks.forEach(([bx, by]) => {
      const py = currentPiece.y + by;
      if (py >= 0) drawBlock(ctx, currentPiece.x + bx, py, currentPiece.color, BLOCK);
    });
  }

  nctx.clearRect(0, 0, 110, 210);
  nextQueue.forEach((p, i) => {
    const size = 20;
    const np = PIECES[p.name];
    const ox = 1, oy = i * 4 + 1;
    np.shape.forEach(([bx, by]) => {
      nctx.fillStyle = np.color;
      nctx.fillRect((bx + ox) * size + 1, (by + oy) * size + 1, size - 2, size - 2);
    });
  });

  hctx.clearRect(0, 0, 110, 70);
  if (holdPiece) {
    const size = 20;
    const hp = PIECES[holdPiece.name];
    hp.shape.forEach(([bx, by]) => {
      hctx.fillStyle = holdUsed ? '#555' : hp.color;
      hctx.fillRect((bx + 1) * size + 1, (by + 1) * size + 1, size - 2, size - 2);
    });
  }
}

function showFlash() {
  flash.style.opacity = '0.3';
  setTimeout(() => flash.style.opacity = '0', 100);
}

function showCombo(n) {
  comboDisplay.textContent = `${n} COMBO!`;
  comboDisplay.classList.add('show');
  setTimeout(() => comboDisplay.classList.remove('show'), 1200);
}

function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('tetris_best', bestScore);
  }
  document.getElementById('best').textContent = bestScore.toLocaleString();
}

function gameLoop(time) {
  if (gameOver || paused) return;
  if (!lastDrop) lastDrop = time;
  if (time - lastDrop > dropInterval) {
    if (!collides(currentPiece, 0, 1)) {
      currentPiece.y++;
    } else {
      lastMoveWasRotation = false;
      lock();
    }
    lastDrop = time;
    updateUI();
  }
  draw();
  animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  audioCtx.resume();
  initGrid();
  bag = [];
  score = 0; lines = 0; level = 1; combo = 0;
  dropInterval = 1000; lastDrop = 0;
  gameOver = false; paused = false;
  holdPiece = null; holdUsed = false;
  currentPiece = nextFromBag();
  nextQueue = [nextFromBag(), nextFromBag(), nextFromBag()];
  updateUI();
  overlay.style.display = 'none';
  animId = requestAnimationFrame(gameLoop);
}

function endGame() {
  gameOver = true;
  cancelAnimationFrame(animId);
  sfxGameOver();
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('tetris_best', bestScore);
  }
  overlay.innerHTML = `<h1>ゲームオーバー</h1><p>スコア: ${score.toLocaleString()}</p><p class="hi">ベスト: ${bestScore.toLocaleString()}</p><p>Enterキーでリトライ</p>`;
  overlay.style.display = 'flex';
  draw();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && gameOver) { startGame(); return; }
  if (!currentPiece || gameOver) return;
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    if (!paused) { lastDrop = 0; animId = requestAnimationFrame(gameLoop); }
    return;
  }
  if (paused) return;
  switch (e.key) {
    case 'ArrowLeft':
      if (!collides(currentPiece, -1, 0)) { currentPiece.x--; sfxMove(); lastMoveWasRotation = false; }
      break;
    case 'ArrowRight':
      if (!collides(currentPiece, 1, 0)) { currentPiece.x++; sfxMove(); lastMoveWasRotation = false; }
      break;
    case 'ArrowDown':
      if (!collides(currentPiece, 0, 1)) { currentPiece.y++; score++; lastMoveWasRotation = false; updateUI(); }
      break;
    case 'ArrowUp': rotate(); break;
    case ' ': hardDrop(); break;
    case 'Shift': hold(); break;
  }
  e.preventDefault();
  draw();
});

document.getElementById('btnLeft').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused && !collides(currentPiece, -1, 0)) { currentPiece.x--; sfxMove(); draw(); } });
document.getElementById('btnRight').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused && !collides(currentPiece, 1, 0)) { currentPiece.x++; sfxMove(); draw(); } });
document.getElementById('btnDown').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused && !collides(currentPiece, 0, 1)) { currentPiece.y++; score++; updateUI(); draw(); } });
document.getElementById('btnRotate').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused) rotate(); draw(); });
document.getElementById('btnDrop').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused) hardDrop(); });
document.getElementById('btnHold').addEventListener('touchstart', e => { e.preventDefault(); if (currentPiece && !gameOver && !paused) { hold(); draw(); } });

draw();
document.getElementById('best').textContent = bestScore.toLocaleString();
</script>
</body>
</html>
